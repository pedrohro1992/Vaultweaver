---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - security.platform.io
  resources:
  - vaultkubernetesrolebindings
  - vaultpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - security.platform.io
  resources:
  - vaultkubernetesrolebindings/finalizers
  - vaultpolicies/finalizers
  verbs:
  - update
- apiGroups:
  - security.platform.io
  resources:
  - vaultkubernetesrolebindings/status
  - vaultpolicies/status
  verbs:
  - get
  - patch
  - update
