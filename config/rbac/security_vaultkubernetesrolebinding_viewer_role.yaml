# This rule is not used by the project vaultweaver itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to security.platform.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vaultweaver
    app.kubernetes.io/managed-by: kustomize
  name: security-vaultkubernetesrolebinding-viewer-role
rules:
- apiGroups:
  - security.platform.io
  resources:
  - vaultkubernetesrolebindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - security.platform.io
  resources:
  - vaultkubernetesrolebindings/status
  verbs:
  - get
