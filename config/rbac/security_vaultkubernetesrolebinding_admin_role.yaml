# This rule is not used by the project vaultweaver itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over security.platform.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vaultweaver
    app.kubernetes.io/managed-by: kustomize
  name: security-vaultkubernetesrolebinding-admin-role
rules:
- apiGroups:
  - security.platform.io
  resources:
  - vaultkubernetesrolebindings
  verbs:
  - '*'
- apiGroups:
  - security.platform.io
  resources:
  - vaultkubernetesrolebindings/status
  verbs:
  - get
